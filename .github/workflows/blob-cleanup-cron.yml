name: Blob Cleanup Cron

on:
  schedule:
    # 03:00 WIB = 20:00 UTC (hari sebelumnya)
    - cron: "0 20 * * *"
  workflow_dispatch: {}

concurrency:
  group: blob-cleanup-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call cleanup-blobs (older than 30 days)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          BLOB_CLEANUP_SECRET: ${{ secrets.BLOB_CLEANUP_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Missing secrets.APP_URL"
            exit 1
          fi
          if [ -z "$BLOB_CLEANUP_SECRET" ]; then
            echo "Missing secrets.BLOB_CLEANUP_SECRET"
            exit 1
          fi
          URL="${APP_URL%/}/api/cleanup-blobs?secret=${BLOB_CLEANUP_SECRET}&days=30"
          echo "Calling $URL"
          curl -fsS --retry 3 --retry-delay 2 --max-time 60 "$URL"

