name: Blob Cleanup Cron

on:
  schedule:
    # 03:00 WIB = 20:00 UTC (hari sebelumnya)
    - cron: "0 20 * * *"
  workflow_dispatch: {}

concurrency:
  group: blob-cleanup-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call cleanup-blobs (older than 30 days)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          BLOB_CLEANUP_SECRET: ${{ secrets.BLOB_CLEANUP_SECRET }}
        run: |
          # Jika secret belum dikonfigurasi, skip dengan peringatan (bukan error)
          if [ -z "$APP_URL" ]; then
            echo "::warning::secrets.APP_URL belum diset — lewati langkah ini."
            exit 0
          fi
          if [ -z "$BLOB_CLEANUP_SECRET" ]; then
            echo "::warning::secrets.BLOB_CLEANUP_SECRET belum diset — lewati langkah ini."
            exit 0
          fi

          URL="${APP_URL%/}/api/cleanup-blobs?secret=${BLOB_CLEANUP_SECRET}&days=30"
          echo "Calling $URL"

          # Simpan body response dan HTTP status code secara terpisah
          HTTP_CODE=$(curl -sS --retry 3 --retry-delay 2 --max-time 60 \
            -w "%{http_code}" \
            -o /tmp/cleanup_response.json \
            "$URL" || echo "000")

          echo "HTTP status: $HTTP_CODE"
          cat /tmp/cleanup_response.json || true

          # Gagalkan job hanya jika HTTP code bukan 2xx
          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "::error::cleanup-blobs returned HTTP $HTTP_CODE"
            exit 1
          fi
